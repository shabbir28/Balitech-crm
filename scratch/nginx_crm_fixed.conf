server {
    server_name crm.balitech.tech;
    client_max_body_size 300M;

    # Frontend build path
    root /var/www/crm;
    index index.html;

    # =========================
    # FRONTEND (React/Vite)
    # =========================
    location / {
        try_files $uri /index.html;
    }

    # =========================
    # BACKEND API — BULK UPLOAD (special long timeouts)
    # =========================
    # upload-fresh: backend now returns 202 instantly (async job),
    # but we still give it 120s for very large file transfers.
    location /api/jobs/upload-fresh {
        proxy_pass http://localhost:5000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering    off;

        # ✅ FIXED: was 60s (default) → now 120s for large file uploads
        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # compare: also can be slow for large files
    location /api/jobs/compare {
        proxy_pass http://localhost:5000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering    off;

        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # =========================
    # BACKEND API — ALL OTHER (normal timeouts)
    # =========================
    location /api {
        proxy_pass http://localhost:5000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering    off;

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # =========================
    # STATIC FILE CACHING
    # =========================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # =========================
    # SECURITY HEADERS (BASIC)
    # =========================
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # ✅ SSL (Let's Encrypt)
    listen 8443 ssl;

    ssl_certificate     /etc/letsencrypt/live/crm.balitech.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.balitech.tech/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name crm.balitech.tech;
    return 301 https://$host$request_uri;
}
